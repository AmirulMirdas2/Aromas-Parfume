{% load static %}
<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Aromas Parfume</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="{% static 'pages/css/style.css' %}" />
  <link rel="stylesheet" href="{% static 'pages/css/auth.css' %}" />
</head>
<body>
  <header class="header-nav" style="background-color: white;">
    <nav class="navbar-container">
      <a href="/" class="logo-block">
        <img src="{% static 'pages/images/aromasparfume.jpg' %}" alt="Aromas Parfume Logo" class="logo-img"
          style="border-radius: 50%" />
        <span class="brand-title" style="color: black;">Aromas Parfume</span>
      </a>
      <ul class="nav-links">
        <li class="nav-item"><a href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a href="{% url 'products' %}">Products</a></li>
        <li class="nav-item"><a href="#">About</a></li>
        <li class="nav-item"><a href="#">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <button class="icon-btn" aria-label="Search">
          <span class="material-symbols-outlined">search</span>
        </button>
        <a href="{% url 'cart' %}" class="icon-btn" aria-label="Shopping Bag" style="color: inherit; text-decoration: none;">
          <span class="material-symbols-outlined">shopping_bag</span>
        </a>
        {% if user.is_authenticated %}
          <a href="{% url 'logout' %}" class="icon-btn" aria-label="Logout" style="color: inherit; text-decoration: none;" title="Logout">
            <span class="material-symbols-outlined">logout</span>
          </a>
        {% else %}
          <a href="{% url 'login' %}" class="icon-btn" aria-label="Account" style="color: inherit; text-decoration: none;" title="Login">
            <span class="material-symbols-outlined">person</span>
          </a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main style="min-height: 70vh;">
    <div class="auth-container">
      <h2>Login</h2>
      <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="auth-btn">Masuk</button>
      </form>
      <div class="auth-link">
        Belum punya akun? <a href="{% url 'register' %}?next={{ request.GET.next }}">Daftar disini</a>
      </div>
    </div>
  </main>
</body>
</html>
